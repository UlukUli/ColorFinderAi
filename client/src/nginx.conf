server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /auth/ {
        proxy_pass http://server:5000/auth/;
        proxy_set_header Host $host;
    }

    location /palette/ {
        proxy_pass http://server:5000/palette/;
        proxy_set_header Host $host;
    }

    location /ai/ {
        proxy_pass http://server:5000/ai/;
        proxy_set_header Host $host;
    }
}